
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Image Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .image-container {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 100%;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
        p {
            color: #555;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Displaying an Image in HTML</h1>
    
    <div class="image-container">
        <!-- The img tag embeds the picture -->
        <img src="11782838277089.png" alt="logo" width="600" height="400">
        <p>This image is loaded dynamically using a placeholder URL.</p>
    </div>

</body>
</html>
